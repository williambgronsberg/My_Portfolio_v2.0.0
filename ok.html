<!DOCTYPE html>
<html lang="no">
<head>
	<meta charset="UTF-8">
	<title>Mitt nærområde</title>
	<link rel="stylesheet" href="">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: "Times New Roman", serif;
			background: white;
			color: black;
		}

		.layout {
			display: grid;
			grid-template-columns: 1.2fr 1fr;
			gap: 4rem;
			padding: 4rem;
		}

		/* VENSTRE */
		.left {
			display: flex;
			flex-direction: column;
		}

		.hero {
			width: 100%;
			height: auto;
			object-fit: cover;
		}

		.text {
			margin-top: 2rem;
		}

		.text h1 {
			font-size: 3rem;
			letter-spacing: 1px;
		}

		.text h2 {
			font-size: 1.2rem;
			margin: 0.5rem 0 1rem;
		}

		.text p {
			max-width: 400px;
			font-size: 0.95rem;
			line-height: 1.5;
		}

		/* HØYRE */
		.right {
			display: grid;
			grid-template-columns: 1fr 1fr;
			grid-auto-rows: min-content;
			gap: 1.5rem;
		}

		.right img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.right-text {
			grid-column: span 1;
			font-size: 0.85rem;
			line-height: 1.5;
		}

		/* Høyt bilde (bygningen) */
		.tall {
			grid-row: span 2;
		}
	</style>
</head>
<body>

	<main class="layout">

		<!-- VENSTRE SIDE -->
		<section class="left">
			<img src="assets/img/image 3.png" alt="Road at night" class="hero">

			<div class="text">
				<h1>MITT NÆROMRÅDE</h1>
				<h2>02.</h2>
				<p>
					Lorem ipsum dolor sit amet, consectetur adipiscing elit.
					Curabitur lobortis orci rutrum dapibus maximus.
				</p>
			</div>
		</section>

		<!-- HØYRE SIDE -->
		<section class="right">
			<div class="right-text">
				<p>
					Lorem ipsum dolor sit amet, consectetur adipiscing elit.
					Sed posuere pretium luctus. Sed enim lectus, facilisis a mauris et.
				</p>
			</div>

			<img src="images/car.jpg" alt="">
			<img src="images/house.jpg" alt="">
			<img src="images/building.jpg" alt="" class="tall">
			<img src="images/busstop.jpg" alt="">
		</section>

	</main>

</body>
</html>
