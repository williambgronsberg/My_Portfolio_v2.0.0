<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terningkast Program</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>Terningkast Simulator</h1>

        <section>
            <h2>Resultater</h2>
            <button  onclick="kastTerning()" id="kast-knapp">Kast terningen på nytt</button>
            
            <p id="resultater">Terningkast: </p>
            <p id="summen">Summen av kastene: </p>
            <p id="gjennomsnitt_resultat">Gjennomsnittet av kastene: </p>
            <p id="partall_resultat">Antall partall: </p>
            <p id="oddetall_resultat">Antall oddetall: </p>
            <p id="kastforseksresultat">Kastene før første 6: </p>
            <p id="hoyestelavesteresultat">Høyeste og laveste kast: </p>
            <p id="mest_kastet_resultat">Mest kastede tall: </p>
            <p id="stolpediagram_resultat">Stolpediagram: </p>
           
            
        </section>
    </section>

    <script src="script.js"></script>
</body>
</html>
