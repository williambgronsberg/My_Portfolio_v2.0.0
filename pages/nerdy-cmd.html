<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0e0e0e;
            color: #cccccc;
            font-family: 'Courier New', Consolas, monospace;
            font-size: 14px;
            line-height: 1.4;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #cmd-container {
            width: 100%;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #output {
            overflow-y: visible;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        #output::-webkit-scrollbar {
            width: 10px;
        }

        #output::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #output::-webkit-scrollbar-thumb {
            background: #333;
        }

        .line {
            display: block;
            min-height: 1.4em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-line {
            color: #cccccc;
        }

        .error-text {
            color: #ff5555;
        }

        .success-text {
            color: #55ff55;
        }

        .info-text {
            color: #55aaff;
        }

        #input-area {
            padding: 10px;
            background: #0e0e0e;
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .prompt {
            color: #cccccc;
            margin-right: 0;
            white-space: nowrap;
        }

        #cmd-input {
            background: transparent;
            color: #ffffff;
            border: none;
            outline: none;
            font-family: 'Courier New', Consolas, monospace;
            font-size: 14px;
            flex: 1;
            caret-color: #ffffff;
        }
    </style>
</head>
<body>
    <div id="cmd-container">
        <div id="output"></div>
        <div id="input-area">
            <span class="prompt" id="prompt">C:\Users\WBG></span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const cmdInput = document.getElementById('cmd-input');
        const prompt = document.getElementById('prompt');

        let currentDir = 'C:\\Users\\WBG';
        let commandHistory = [];
        let historyIndex = -1;
        let aiMode = false;
        let aiHistory = [];

        // ============================================
        // AI CONFIG
        // ============================================
        const API_HOST = 'https://untriumphantly-nonsiliceous-latosha.ngrok-free.dev';
        // ============================================

        // Command to change model in terminal

        const projects = {
            'nerdy-cmd': { name: 'Nerdy CMD Interface', desc: 'Interactive terminal', link: 'pages/nerdy-cmd.html' },
            'next-break': { name: 'Next Break', desc: 'Bike-share finder', link: 'https://im24wil27051.imporsgrunn.no/pages/projects/pauser/' },
            'school-cms': { name: 'School CMS', desc: 'Content management', link: 'schoolsite/schoolingsys/index.html' },
            'portfolio': { name: 'Portfolio', desc: 'This website', link: 'index.html' }
        };

        const allCommands = [
            'help', 'cls', 'clear', 'exit', 'quit', 'whoami', 'date', 'time', 'ver',
            'cd', 'dir', 'ls', 'tree', 'md', 'rd', 'copy', 'move', 'del', 'type',
            'echo', 'prompt', 'title', 'systeminfo', 'ipconfig', 'ping',
            'about', 'projects', 'skills', 'contact', 'open', 'github', 'linkedin',
            'neofetch', 'calc', 'fortune', 'joke', 'coffee', 'ask', 'ai'
        ];

        function print(text, className = '') {
            const line = document.createElement('span');
            line.className = 'line ' + className;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function printHTML(html) {
            const line = document.createElement('span');
            line.className = 'line';
            line.innerHTML = html;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const command = parts[0].toLowerCase();
            const args = parts.slice(1);

            switch(command) {
                case 'help':
                case '?':
                    print('');
                    print('For more information on a specific command, type HELP command-name', 'info-text');
                    print('');
                    print('ASSOC    ATTRIB    CACLS    CD       CHDIR    CHKDSK', 'output-line');
                    print('CLS      COLOR     COMP     COPY     DATE     DEL', 'output-line');
                    print('DIR      ECHO      EXIT     FIND     FORMAT   FSUTIL', 'output-line');
                    print('HELP     IPCONFIG  LABEL    MD       MKLINK   MOVE', 'output-line');
                    print('NET      PATH      PAUSE    PING     PROMPT   RD', 'output-line');
                    print('REN      RMDIR     SET      TIME     TITLE    TREE', 'output-line');
                    print('TYPE     VER       VOL      XCOPY', 'output-line');
                    print('');
                    print('CUSTOM: ABOUT  PROJECTS  SKILLS  CONTACT  GITHUB  NEOFETCH', 'info-text');
                    print('AI: ASK  AI', 'success-text');
                    break;

                case 'cls':
                case 'clear':
                    output.innerHTML = '';
                    break;

                case 'exit':
                case 'quit':
                    if (aiMode) {
                        aiMode = false;
                        aiHistory = [];
                        print('Exiting AI chat mode.', 'info-text');
                        updatePrompt();
                    } else {
                        print('Goodbye!');
                    }
                    break;

                case 'whoami':
                    print('WBG\\William');
                    break;

                case 'date':
                    print(new Date().toLocaleDateString());
                    break;

                case 'time':
                    print(new Date().toLocaleTimeString());
                    break;

                case 'ver':
                    print('Microsoft Windows [Version 10.0.19045.3803]');
                    print('(c) Microsoft Corporation. All rights reserved.');
                    break;

                case 'cd':
                case 'chdir':
                    if (args[0]) {
                        if (args[0] === '..') {
                            if (currentDir !== 'C:\\Users\\WBG') {
                                const parts = currentDir.split('\\');
                                parts.pop();
                                currentDir = parts.join('\\') || 'C:\\';
                            }
                        } else {
                            currentDir = currentDir + '\\' + args[0];
                        }
                        updatePrompt();
                    } else {
                        currentDir = 'C:\\Users\\WBG';
                        updatePrompt();
                    }
                    break;

                case 'dir':
                case 'ls':
                    print(' Volume in drive C is Windows', 'info-text');
                    print(' Volume Serial Number is A1B2-C3D4', 'output-line');
                    print('');
                    print(' Directory of ' + currentDir, 'info-text');
                    print('');
                    print('05/25/2025  10:30 AM    <DIR>          .');
                    print('05/25/2025  10:30 AM    <DIR>          ..');
                    if (currentDir === 'C:\\Users\\WBG') {
                        print('05/25/2025  10:30 AM    <DIR>          Projects');
                        print('05/25/2025  10:30 AM    <DIR>          Documents');
                        print('05/25/2025  10:30 AM    <DIR>          Downloads');
                    } else {
                        print('05/25/2025  10:30 AM    <DIR>          .');
                    }
                    print('               5 File(s)         17,904 bytes');
                    print('               8 Dir(s)   1,234,567,890 bytes free');
                    break;

                case 'systeminfo':
                    print('Host Name:                 WBG-DESKTOP');
                    print('OS Name:                   Windows 10 Pro');
                    print('OS Version:                10.0.19045 N/A Build 3803');
                    print('System Type:               x64-based PC');
                    print('Total Physical Memory:     16,384 MB');
                    break;

                case 'ipconfig':
                    print('Windows IP Configuration', 'info-text');
                    print('');
                    print('Ethernet adapter Ethernet0:', 'output-line');
                    print('');
                    print('   IPv4 Address. . . . . . . . . . : 192.168.1.100', 'output-line');
                    print('   Subnet Mask . . . . . . . . . . : 255.255.255.0', 'output-line');
                    print('   Default Gateway . . . . . . . . . : 192.168.1.1', 'output-line');
                    break;

                case 'ping':
                    if (!args[0]) {
                        print('Usage: ping target_name', 'error-text');
                        break;
                    }
                    print('Pinging ' + args[0] + ' [127.0.0.1] with 32 bytes of data:', 'info-text');
                    print('');
                    setTimeout(() => print('Reply from ' + args[0] + ': bytes=32 time=1ms TTL=64'), 500);
                    setTimeout(() => print('Reply from ' + args[0] + ': bytes=32 time=1ms TTL=64'), 1000);
                    setTimeout(() => print('Reply from ' + args[0] + ': bytes=32 time=1ms TTL=64'), 1500);
                    setTimeout(() => print('Reply from ' + args[0] + ': bytes=32 time=1ms TTL=64'), 2000);
                    setTimeout(() => {
                        print('');
                        print('Ping statistics for ' + args[0] + ':', 'info-text');
                        print('    Packets: Sent = 4, Received = 4, Lost = 0 (0% loss)', 'output-line');
                    }, 2500);
                    break;

                case 'echo':
                    print(args.join(' '));
                    break;

                case 'title':
                    if (args.length > 0) {
                        document.title = args.join(' ');
                        print('Title set to: ' + args.join(' '), 'success-text');
                    }
                    break;

                case 'about':
                    print('');
                    print(' William Berge Groensberg', 'info-text');
                    print(' =========================', 'info-text');
                    print('');
                    print(' Web Developer & Designer');
                    print(' Location: Norway');
                    print('');
                    print(' Creating minimalist websites with clean design.', 'output-line');
                    break;

                case 'projects':
                    print('');
                    print(' PORTFOLIO PROJECTS', 'info-text');
                    print(' ===================', 'info-text');
                    print('');
                    let i = 1;
                    for (const [key, project] of Object.entries(projects)) {
                        print(i + '. ' + project.name, 'success-text');
                        print('   ' + project.desc, 'output-line');
                        print('');
                        i++;
                    }
                    print("Type 'open <name>' to view.", 'info-text');
                    break;

                case 'open':
                    if (!args[0]) {
                        print("Type 'projects' to see available projects.", 'error-text');
                        break;
                    }
                    const project = projects[args[0].toLowerCase()];
                    if (project) {
                        print('Opening ' + project.name + '...', 'info-text');
                        window.open(project.link, '_blank');
                    } else {
                        print("Project '" + args[0] + "' not found.", 'error-text');
                    }
                    break;

                case 'skills':
                    print('');
                    print(' TECHNICAL SKILLS', 'info-text');
                    print(' ================', 'info-text');
                    print('');
                    print('Frontend: HTML5, CSS3, JavaScript, React', 'success-text');
                    print('Backend: Node.js, Python, Firebase, SQL', 'success-text');
                    print('Tools: Git, GitHub, VS Code, npm', 'success-text');
                    break;

                case 'contact':
                    print('');
                    print(' CONTACT INFORMATION', 'info-text');
                    print(' ===================', 'info-text');
                    print('');
                    print(' Email:    william@example.com');
                    print(' GitHub:   github.com/sneakyturtle270508');
                    print(' LinkedIn: linkedin.com/in/williambergegroensberg');
                    break;

                case 'github':
                    print('Opening GitHub...', 'info-text');
                    window.open('https://github.com/sneakyturtle270508', '_blank');
                    break;

                case 'linkedin':
                    print('Opening LinkedIn...', 'info-text');
                    window.open('https://linkedin.com/in/williambergegroensberg', '_blank');
                    break;

                case 'neofetch':
                    print('');
                    print('    .--------.        WBG@WBG-DESKTOP', 'info-text');
                    print('    |  O  O  |        OS: Windows 10 Pro', 'output-line');
                    print('    |   __   |        Host: Custom PC', 'output-line');
                    print('    |__|  |__|        Resolution: ' + window.innerWidth + 'x' + window.innerHeight, 'output-line');
                    break;

                case 'calc':
                    if (args.length === 0) {
                        print('Usage: calc <expression>', 'error-text');
                        break;
                    }
                    try {
                        const result = eval(args.join(''));
                        print(args.join('') + ' = ' + result, 'success-text');
                    } catch (e) {
                        print('Error: Invalid expression', 'error-text');
                    }
                    break;

                case 'fortune':
                    const fortunes = [
                        "A programmer is just a machine that turns coffee into code.",
                        "There are only two hard things: cache invalidation and naming things.",
                        "Debugging is twice as hard as writing the code.",
                        "First, solve the problem. Then, write the code."
                    ];
                    print('"' + fortunes[Math.floor(Math.random() * fortunes.length)] + '"', 'success-text');
                    break;

                case 'joke':
                    const jokes = [
                        "Why do programmers prefer dark mode? Because light attracts bugs!",
                        "A SQL query walks into a bar and asks... 'Can I join you?'",
                        "Why was the JavaScript developer in tears? Because he didn't null his feelings!"
                    ];
                    print(jokes[Math.floor(Math.random() * jokes.length)], 'success-text');
                    break;

                case 'coffee':
                    print('');
                    print('     ( (');
                    print('      ) )');
                    print('    ._______.');
                    print('    |       |]');
                    print('    \\       /');
                    print('     `-----\'');
                    print('');
                    print('Thanks for the support!', 'success-text');
                    break;

                case 'ask':
                case 'ai':
                    startAIMode();
                    break;

                default:
                    print("'" + command + "' is not recognized as an internal or external command,", 'error-text');
                    print('operable program or batch file.', 'error-text');
            }
        }

        function updatePrompt() {
            if (aiMode) {
                prompt.textContent = 'AI> ';
            } else {
                prompt.textContent = currentDir + '>';
            }
        }

        function startAIMode() {
            aiMode = true;
            aiHistory = [];
            print('');
            print('════════════════════════════════════════════════════════════', 'info-text');
            print(' AI Chat Mode - Powered by WBG API', 'info-text');
            print('════════════════════════════════════════════════════════════', 'info-text');
            print('');
            print('You are now chatting with the AI.', 'success-text');
            print("Type 'exit' or 'quit' to return to normal mode.", 'output-line');
            print('');
            print('AI: Hello! How can I help you today?', 'success-text');
            aiHistory.push({ role: 'assistant', content: 'Hello! How can I help you today?' });
            updatePrompt();
        }

        async function sendToAI(message) {
            print('');
            print('You: ' + message, 'output-line');
            print('');
            
            const typingLine = document.createElement('span');
            typingLine.className = 'line info-text';
            typingLine.innerHTML = 'AI: <span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
            output.appendChild(typingLine);
            
            aiHistory.push({ role: 'user', content: message });

            try {
                const response = await fetch(API_HOST + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error('API returned ' + response.status);

                const text = await response.text();
                typingLine.remove();
                
                print('AI: ' + text, 'success-text');
                aiHistory.push({ role: 'assistant', content: text });

            } catch (error) {
                typingLine.remove();
                print('');
                print('Error: Cannot connect to API.', 'error-text');
                print('Details: ' + error.message, 'info-text');
            }
        }

        // Handle input
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const command = this.value.trim();

                if (!command) return;

                // Add to history
                commandHistory.unshift(command);
                historyIndex = -1;

                // Show command
                printHTML('<span class="line">' + currentDir + '>' + command + '</span>');

                if (aiMode) {
                    if (command.toLowerCase() === 'exit' || command.toLowerCase() === 'quit') {
                        aiMode = false;
                        aiHistory = [];
                        print('Exiting AI chat mode.', 'info-text');
                        updatePrompt();
                    } else {
                        this.value = '';
                        sendToAI(command);
                    }
                } else {
                    processCommand(command);
                    updatePrompt();
                }

                this.value = '';
                output.scrollTop = output.scrollHeight;
            }

            // Tab completion
            if (e.key === 'Tab') {
                e.preventDefault();
                const input = this.value.toLowerCase().trim();
                if (!input) return;

                const parts = input.split(/\s+/);
                
                // Complete project names
                if (parts[0] === 'open' && parts.length > 1) {
                    const partial = parts[1];
                    const matches = Object.keys(projects).filter(p => p.startsWith(partial));
                    if (matches.length === 1) {
                        this.value = 'open ' + matches[0];
                    } else if (matches.length > 1) {
                        print('');
                        print(matches.join('  '), 'output-line');
                    }
                    return;
                }

                // Complete commands
                const matches = allCommands.filter(cmd => cmd.startsWith(input));
                if (matches.length === 1) {
                    this.value = matches[0];
                } else if (matches.length > 1) {
                    print('');
                    print(matches.join('  '), 'output-line');
                }
            }

            // History navigation
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    this.value = commandHistory[historyIndex];
                }
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    this.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    this.value = '';
                }
            }
        });

        // Focus on click
        document.getElementById('cmd-container').addEventListener('click', function() {
            cmdInput.focus();
        });

        // Initial messages
        print('Microsoft Windows [Version 10.0.19045.3803]');
        print('(c) Microsoft Corporation. All rights reserved.');
        print('');
        print('Type HELP for a list of available commands.', 'info-text');
        print("Type 'projects' to see my portfolio projects.", 'info-text');
        print("Type 'ask' to chat with AI.", 'info-text');
        print('');
    </script>
</body>
</html>
