<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0e0e0e;
            color: #cccccc;
            font-family: 'Courier New', Consolas, monospace;
            font-size: 14px;
            line-height: 1.4;
            height: 100vh;
            overflow: hidden;
        }

        #cmd-container {
            width: 100%;
            height: 100vh;
            padding: 10px;
            overflow-y: auto;
        }

        #cmd-container::-webkit-scrollbar {
            width: 10px;
        }

        #cmd-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #cmd-container::-webkit-scrollbar-thumb {
            background: #333;
        }

        .line {
            display: block;
            min-height: 1.4em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-line {
            display: flex;
            align-items: center;
        }

        .prompt-text {
            color: #cccccc;
            margin-right: 0;
        }

        #cmd-input {
            background: transparent;
            color: #ffffff;
            border: none;
            outline: none;
            font-family: 'Courier New', Consolas, monospace;
            font-size: 14px;
            caret-color: #ffffff;
            flex: 1;
            padding: 0;
        }

        .output-line {
            color: #cccccc;
        }

        .error-text {
            color: #ff5555;
        }

        .success-text {
            color: #55ff55;
        }

        .info-text {
            color: #55aaff;
        }
    </style>
</head>
<body>
    <div id="cmd-container">
        <span class="line output-line">Microsoft Windows [Version 10.0.19045.3803]</span>
        <span class="line output-line">(c) Microsoft Corporation. All rights reserved.</span>
        <span class="line output-line"></span>
        
        <div class="line prompt-line">
            <span class="prompt-text" id="prompt">C:\Users\WBG></span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false">
        </div>
    </div>

        // Print text to terminal
        function print(text, className = '') {
            const line = document.createElement('span');
            line.className = 'line ' + className;
            line.textContent = text;
            
            // Insert before the prompt line (input)
            const promptLine = cmdContainer.querySelector('.prompt-line');
            if (promptLine) {
                cmdContainer.insertBefore(line, promptLine);
            } else {
                cmdContainer.appendChild(line);
            }
            
            cmdContainer.scrollTop = cmdContainer.scrollHeight;
        }

                    print('SYSTEMINFO     TIME            TITLE            TREE', 'output-line');
                    print('TYPE           VER             VOL              XCOPY', 'output-line');

                case 'ping':

                    print('Pinging ' + args[0] + ' [127.0.0.1] with 32 bytes of data:', 'info-text');

                    print('');

                case 'matrix':

                    print('');

                case 'hack':

                case 'rickroll':

                case 'sudo':

                    if (!args[0]) {
                        print('Usage: TYPE filename', 'error-text');
                    } else if (args[0] === 'about.txt' || args[0] === 'about') {
                        processCommand('about');
                    } else if (args[0] === 'skills.txt' || args[0] === 'skills') {
                        processCommand('skills');
                    } else if (args[0] === 'contact.txt' || args[0] === 'contact') {

                    } else {
                        print('File not found: ' + args[0], 'error-text');
                    }
                    break;

                case 'md':
                case 'mkdir':
                    if (args[0]) {
                        print('Directory created: ' + args[0], 'success-text');
                    } else {
                        print('The syntax of the command is incorrect.', 'error-text');
                    }
                    break;

                case 'rd':
                case 'rmdir':
                    if (args[0]) {
                        print('Directory deleted: ' + args[0], 'success-text');
                    } else {

                    } else {
                        print('The syntax of the command is incorrect.', 'error-text');

                default:
                    print("'" + command + "' is not recognized as an internal or external command,", 'error-text');

            return result;
        }

        // Update prompt
        function updatePrompt() {
            const promptEl = document.getElementById('prompt');
            if (promptEl) {
                if (aiMode) {
                    promptEl.textContent = 'AI> ';
                } else {
                    promptEl.textContent = currentDir + '>';
                }
            }
        }

        // Start AI mode
        function startAIMode() {
            aiMode = true;
            aiHistory = [];
            print('');
            print('════════════════════════════════════════════════════════════', 'info-text');
            print(' AI Chat Mode - Powered by Ollama (wag-bot:latest)', 'info-text');
            print('════════════════════════════════════════════════════════════', 'info-text');
            print('');
            print('You are now chatting with the AI assistant.', 'success-text');
            print('Type your questions and press Enter to get answers.', 'output-line');
            print("Type 'exit' or 'quit' to return to normal mode.", 'output-line');
            print("Type 'clear' to clear the chat history.", 'output-line');
            print('');
            print('AI: Hello! How can I help you today?', 'success-text');
            aiHistory.push({ role: 'assistant', content: 'Hello! How can I help you today?' });
            updatePrompt();
        }

        // Exit AI mode
        function exitAIMode() {
            aiMode = false;
            aiHistory = [];
            print('');
            print('Exiting AI chat mode.', 'info-text');
            updatePrompt();
        }

        // Send message to AI
        async function sendToAI(message) {
            print('');
            print('You: ' + message, 'output-line');
            print('');
            print('AI: Thinking...', 'info-text');
            
            // Add user message to history
            aiHistory.push({ role: 'user', content: message });
            
            try {
                const response = await fetch(OLLAMA_HOST + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        stream: true,
                        messages: [
                            { role: 'system', content: AI_SYSTEM },
                            ...aiHistory
                        ]
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to connect to Ollama');
                }
                
                // Remove "Thinking..." message
                const lines = cmdContainer.querySelectorAll('.line');
                if (lines.length > 0) {
                    const lastLine = lines[lines.length - 1];
                    if (lastLine.textContent === 'AI: Thinking...') {
                        lastLine.remove();
                    }
                }
                
                // Read streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                
                // Create AI response element
                const responseLine = document.createElement('div');
                responseLine.className = 'line success-text';
                responseLine.textContent = 'AI: ';
                const promptLineForResponse = cmdContainer.querySelector('.prompt-line');
                if (promptLineForResponse) {
                    cmdContainer.insertBefore(responseLine, promptLineForResponse);
                } else {
                    cmdContainer.appendChild(responseLine);
                }
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    for (const line of chunk.split('\n')) {
                        if (line.trim()) {
                            try {
                                const data = JSON.parse(line);
                                if (data.message && data.message.content) {
                                    fullResponse += data.message.content;
                                    responseLine.textContent = 'AI: ' + fullResponse;
                                    cmdContainer.scrollTop = cmdContainer.scrollHeight;
                                }
                            } catch (e) {
                                // Skip invalid JSON
                            }
                        }
                    }
                }
                
                // Add AI response to history
                aiHistory.push({ role: 'assistant', content: fullResponse });
                cmdContainer.scrollTop = cmdContainer.scrollHeight;
                
            } catch (error) {
                // Remove "Thinking..." message if error
                const lines = cmdContainer.querySelectorAll('.line');
                if (lines.length > 0) {
                    const lastLine = lines[lines.length - 1];
                    if (lastLine.textContent === 'AI: Thinking...') {
                        lastLine.remove();
                    }
                }
                
                print('');
                print('Error: Cannot connect to Ollama.', 'error-text');
                print('Make sure Ollama is running: OLLAMA_ORIGINS=* ollama serve', 'error-text');
                print('And that the model is available: ollama pull wag-bot:latest', 'error-text');
            }
        }

        // Setup input handlers
        function setupInput() {
            const newInput = document.getElementById('cmd-input');
            if (!newInput) return;

            newInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const command = this.value.trim();
                    
                    if (!command) return;
                    
                    // Check for clear/cls first
                    if (command.toLowerCase() === 'cls' || command.toLowerCase() === 'clear') {
                        // Execute clear
                        cmdContainer.innerHTML = '';
                        const promptLine = document.createElement('div');
                        promptLine.className = 'line prompt-line';
                        promptLine.innerHTML = '<span class="prompt-text" id="prompt">C:\\Users\\WBG></span><input type="text" id="cmd-input" autocomplete="off" spellcheck="false">';
                        cmdContainer.appendChild(promptLine);
                        setupInput();
                        return;
                    }
                    
                    // In AI mode, handle differently
                    if (aiMode) {
                        // Add user message to history
                        commandHistory.unshift(command);
                        historyIndex = -1;
                        
                        // Show user message
                        const cmdLine = document.createElement('div');
                        cmdLine.className = 'line';
                        cmdLine.textContent = 'You: ' + command;
                        const promptLine = cmdContainer.querySelector('.prompt-line');
                        if (promptLine) {
                            cmdContainer.insertBefore(cmdLine, promptLine);
                        } else {
                            cmdContainer.appendChild(cmdLine);
                        }
                        
                        // Check for exit commands
                        if (command.toLowerCase() === 'exit' || command.toLowerCase() === 'quit') {
                            exitAIMode();
                        } else if (command.toLowerCase() === 'clear' || command.toLowerCase() === 'cls') {
                            // Clear chat but stay in AI mode
                            const lines = cmdContainer.querySelectorAll('.line');
                            lines.forEach(line => line.remove());
                            print('Chat cleared. Type your next question.', 'info-text');
                            aiHistory = [];
                        } else {
                            // Send to AI
                            this.value = '';
                            sendToAI(command);
                        }
                        
                        this.value = '';
                        cmdContainer.scrollTop = cmdContainer.scrollHeight;
                        return;
                    }
                    
                    // Normal mode
                    if (command) {
                        commandHistory.unshift(command);
                        historyIndex = -1;
                    }
                    
                    // Show the command with current directory
                    const cmdLine = document.createElement('div');
                    cmdLine.className = 'line';
                    cmdLine.textContent = currentDir + '>' + command;
                    const promptLine = cmdContainer.querySelector('.prompt-line');
                    if (promptLine) {
                        cmdContainer.insertBefore(cmdLine, promptLine);
                    } else {
                        cmdContainer.appendChild(cmdLine);
                    }
                    
                    if (command) {
                        processCommand(command);
                    }
                    
                    // Update the prompt display
                    updatePrompt();
                    
                    // Clear the input
                    this.value = '';
                    cmdContainer.scrollTop = cmdContainer.scrollHeight;
                }
                
                // Tab key for auto-completion
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const input = this.value.toLowerCase().trim();
                    
                    if (!input) return;
                    
                    const parts = input.split(/\s+/);
                    
                    // Check if we're completing a project name (after 'open')
                    if (parts.length > 1 && parts[0] === 'open') {
                        const partialName = parts[1];
                        const projectNames = Object.keys(projects);
                        const matches = projectNames.filter(name => 
                            name.toLowerCase().startsWith(partialName)
                        );
                        
                        if (matches.length === 1) {
                            this.value = 'open ' + matches[0];
                        } else if (matches.length > 1) {
                            const cmdLine = document.createElement('div');
                            cmdLine.className = 'line output-line';
                            cmdLine.textContent = matches.join('  ');
                            cmdContainer.insertBefore(cmdLine, newInput.parentElement);
                            cmdContainer.scrollTop = cmdContainer.scrollHeight;
                        }
                        return;
                    }
                    
                    // Check if we're completing a directory name (after 'cd')
                    if ((parts[0] === 'cd' || parts[0] === 'chdir') && parts.length > 1) {
                        const partialDir = parts[1];
                        const matches = directoryNames.filter(dir => 
                            dir.toLowerCase().startsWith(partialDir)
                        );
                        
                        if (matches.length === 1) {
                            this.value = 'cd ' + matches[0];
                        } else if (matches.length > 1) {
                            const cmdLine = document.createElement('div');
                            cmdLine.className = 'line output-line';
                            cmdLine.textContent = matches.join('  ');
                            cmdContainer.insertBefore(cmdLine, newInput.parentElement);
                            cmdContainer.scrollTop = cmdContainer.scrollHeight;
                        }
                        return;
                    }
                    
                    // Find matching commands
                    const matches = allCommands.filter(cmd => 
                        cmd.toLowerCase().startsWith(input)
                    );
                    
                    if (matches.length === 1) {
                        // Single match - auto-complete
                        this.value = matches[0];
                    } else if (matches.length > 1) {
                        // Multiple matches - show them
                        const cmdLine = document.createElement('div');
                        cmdLine.className = 'line output-line';
                        cmdLine.textContent = matches.join('  ');
                        cmdContainer.insertBefore(cmdLine, newInput.parentElement);
                        cmdContainer.scrollTop = cmdContainer.scrollHeight;
                    }
                }
                
                // Arrow keys for history
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        this.value = commandHistory[historyIndex];
                    }
                }
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        this.value = commandHistory[historyIndex];
                    } else {
                        historyIndex = -1;
                        this.value = '';
                    }
                }
            });

            newInput.addEventListener('click', function() {
                this.focus();
            });

            newInput.focus();
        }

        // Click anywhere to focus
        cmdContainer.addEventListener('click', function(e) {
            const input = document.getElementById('cmd-input');
            if (input) {
                input.focus();
            }
        });

        // Initial setup
        setupInput();

        // Show welcome messages (after the banner, before the input)
        const promptLine = cmdContainer.querySelector('.prompt-line');
        
        const welcomeLine1 = document.createElement('span');
        welcomeLine1.className = 'line output-line';
        welcomeLine1.textContent = '';
        cmdContainer.insertBefore(welcomeLine1, promptLine);
        
        const welcomeLine2 = document.createElement('span');
        welcomeLine2.className = 'line info-text';
        welcomeLine2.textContent = 'Type HELP for a list of available commands.';
        cmdContainer.insertBefore(welcomeLine2, promptLine);
        
        const welcomeLine3 = document.createElement('span');
        welcomeLine3.className = 'line info-text';
        welcomeLine3.textContent = "Type 'projects' to see my portfolio projects.";
        cmdContainer.insertBefore(welcomeLine3, promptLine);
        
        const welcomeLine4 = document.createElement('span');
        welcomeLine4.className = 'line output-line';
        welcomeLine4.textContent = '';
        cmdContainer.insertBefore(welcomeLine4, promptLine);
    </script>
</body>
