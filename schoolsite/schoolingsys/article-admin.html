            padding: 10px 15px;

            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .button-danger {
            background-color: #db4437;
        }
        .article-list {
            margin-top: 30px;
        }
        .article-card {
            border: 1px solid #e0e0e0;

            justify-content: space-between;
            align-items: center;
        }
        .article-title {
            font-weight: bold;
            font-size: 18px;
        }
        .article-date {
            color: #666;
            font-size: 14px;
        }
        .article-actions {
            display: flex;
            gap: 10px;
        }
        .button-small {
            padding: 5px 10px;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            margin-right: 5px;
        }
        .tab.active {
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
/* Special Delete Button */
.delete-button {
    margin-top: 20px;
    position: relative;
    width: 160px;
    height: 55px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: flex-start; /* Align text initially */
    background: #c40000;
    border: none;
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.3s ease-in-out;
    padding: 0 20px;
}

.delete-button .text {
    color: white;
    font-weight: bold;
    font-size: 16px;
    transition: opacity 0.3s ease-in-out;
}

.delete-button .icon {
    position: absolute;
    right: 10px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease-in-out;
}

/* Icon styling */
.delete-button svg {
    width: 22px;
    fill: #fff;
    transition: transform 0.3s ease-in-out;
}

/* Hover Effects */
.delete-button:hover {
    background: #ff0000;
    
}

.delete-button:hover .text {
    opacity: 0;
}

.delete-button:hover .icon {
    right: 50%; /* Moves icon to the center */
    transform: translateX(50%);
}

.delete-button:active {
    transform: scale(0.95);
}

.delete-button:active .icon svg {
    transform: scale(0.8);
}

/* From Uiverse.io by Peary74 */ 
.cloud-button {
  font-family: inherit;
  font-size: 20px;
  background: #212121;
  color: white;
  fill: rgb(155, 153, 153);
  padding: 0.7em 1em;
  padding-left: 0.9em;
  display: flex;
  align-items: center;
  cursor: pointer;
  border: none;
  border-radius: 15px;
  font-weight: 1000;
}

.cloud-button span {
  display: block;
  margin-left: 0.3em;
  transition: all 0.3s ease-in-out;
}

.cloud-button svg {
  display: block;
  transform-origin: center center;
  transition: transform 0.3s ease-in-out;
}

.cloud-button:hover {
  background: #000;
}

.cloud-button:hover .svg-wrapper {
  transform: scale(1.25);
  transition: 0.5s linear;
}

.cloud-button:hover svg {
  transform: translateX(1.2em) scale(1.1);
  fill: #fff;
}

.cloud-button:hover span {
  opacity: 0;
  transition: 0.5s linear;
}

.cloud-button:active {
  transform: scale(0.95);
}

    </style>
